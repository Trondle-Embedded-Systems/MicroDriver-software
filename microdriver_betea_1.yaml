# Text sensors for diagnostics
text_sensor:
  - platform: version
    name: ESPHome Version

# Output pins
output:
  - platform: gpio
    pin: GPIO18
    id: status_led
    inverted: false

husb238_i2c:
  id: usb_pd
  output_voltage:
    name: "USB Voltage"

external_components:
  - source: github://Trondle-Embedded-Systems/MicroDriver-software
    # tmc2209_hub / tmc2209 / stepper are only needed when the motor stack above
    # is enabled; they are harmless to keep listed while it is commented out.
    components: [tmc2209_hub, tmc2209, stepper, husb238_i2c]
    refresh: 0s
