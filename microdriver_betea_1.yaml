substitutions:
  device_name: microdriver
  friendly_name: MicroDriver Controller

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # --- TMC2209 driver config disabled (UART not in use yet) ---
  # on_boot:
  #   priority: 600
  #   then:
  #     - tmc2209.configure:
  #         microsteps: 8
  #         interpolation: true
  #     - tmc2209.stallguard:
  #         threshold: 50
  #     - tmc2209.currents:
  #         standstill_mode: freewheeling
  #         irun: 16
  #         ihold: 0
  #         tpowerdown: 0
  #         iholddelay: 0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}_AP
    password: !secret ap_password

# Logging
logger:
  level: INFO
  baud_rate: 115200

# Over-the-air updates
ota:
  - platform: esphome
    password: !secret ota_password

# API configuration
api:
  encryption:
    key: !secret api_key

# Web server (optional)
web_server:
  port: 80

# I2C configuration
i2c:
  id: i2c_bus
  sda: GPIO17
  scl: GPIO21
  scan: true

