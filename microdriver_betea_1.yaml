substitutions:
  device_name: microdriver
  friendly_name: MicroDriver Controller

external_components:
  - source: github://Trondle-Embedded-Systems/MicroDriver-software
    # `stepper` is the base used by the built-in `a4988` platform (active).
    # `tmc2209_hub` / `tmc2209` are only needed if you enable the UART stack
    # above; harmless to keep listed while it stays commented out.
    components: [tmc2209_hub, tmc2209, stepper, husb238_i2c]
    refresh: 0s

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # --- UART / TMC2209 register config intentionally NOT used here ---
  # The motor runs in standalone STEP/DIR mode (no UART), so there is no
  # on_boot register configuration. Microstepping and current are set in
  # hardware (MS1/MS2 pins + VREF). To later enable UART diagnostics, see
  # the commented TMC2209 UART stack at the bottom of this file.

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}_AP
    password: !secret ap_password

# Logging
logger:
  level: INFO
  baud_rate: 115200

# Over-the-air updates
ota:
  - platform: esphome
    password: !secret ota_password

# API configuration
api:
  encryption:
    key: !secret api_key

# Web server (optional)
web_server:
  port: 80

# I2C configuration
i2c:
  id: i2c_bus
  sda: GPIO17
  scl: GPIO21
  scan: true

# =====================================================================
# TMC2209 standalone STEP/DIR control (NO UART) — for bring-up / PCB testing.
# This uses the `tmc2209` platform WITHOUT a `tmc2209_hub` / `uart`, so the
# component runs purely on STEP/DIR/ENN pins. Microstepping and current are
# set in hardware (MS1/MS2 pins + VREF); no UART diagnostics (stallguard /
# current sensing) are available in this mode. Add a `tmc2209_hub` + `uart`
# and `tmc2209_hub_id:` later to unlock register config and diagnostics
# (see the commented full UART stack at the bottom of this file).
# =====================================================================

# Stepper motor configuration (TMC2209 standalone step/dir, no UART)
stepper:
  - platform: tmc2209
    id: main_stepper
    step_pin: GPIO35
    dir_pin: GPIO34
    # ENN is active-low and required in standalone mode (no UART to toggle TOFF).
    enn_pin: GPIO9
    max_speed: 900 steps/s
    acceleration: 1500 steps/s^2
    deceleration: 500 steps/s^2

# Control buttons
button:
  - platform: template
    name: Stop Motor
    on_press:
      - stepper.stop: main_stepper
  - platform: template
    name: Move 1000 Steps Forward
    on_press:
      - stepper.set_target:
          id: main_stepper
          target: !lambda return id(main_stepper)->current_position + 1000;
  - platform: template
    name: Move 1000 Steps Backward
    on_press:
      - stepper.set_target:
          id: main_stepper
          target: !lambda return id(main_stepper)->current_position - 1000;
  - platform: template
    name: Reset Position
    on_press:
      - stepper.report_position:
          id: main_stepper
          position: 0

# Target position + speed control
number:
  - platform: template
    name: Target Position
    id: target_position
    min_value: -100000
    max_value: 100000
    step: 100
    unit_of_measurement: steps
    lambda: return id(main_stepper)->current_position;
    update_interval: 1s
    set_action:
      - stepper.set_target:
          id: main_stepper
          target: !lambda return x;
  # Runtime-adjustable max speed (steps/s). The stepper has no speed getter, so
  # this is an optimistic control that remembers its value and applies it via
  # stepper.set_speed. `initial_value` matches the `max_speed:` set above.
  - platform: template
    name: Max Speed
    id: max_speed
    min_value: 50
    max_value: 2000
    step: 50
    initial_value: 900
    unit_of_measurement: steps/s
    icon: mdi:speedometer
    optimistic: true
    mode: box
    set_action:
      - stepper.set_speed:
          id: main_stepper
          speed: !lambda return x;
  # Live jog / velocity control. Drag to run the motor CONTINUOUSLY at the set
  # speed and direction: positive = forward, negative = backward, 0 = stop.
  # Changing the value while running updates the speed on the fly (the motion
  # loop re-ramps toward the new max speed). Implemented by aiming at a far-away
  # target and adjusting max_speed, since the stepper is position-based.
  - platform: template
    name: Jog Speed
    id: jog_speed
    min_value: -2000
    max_value: 2000
    step: 50
    initial_value: 0
    unit_of_measurement: steps/s
    icon: mdi:gauge
    optimistic: true
    mode: slider
    set_action:
      - lambda: |-
          if (x == 0) {
            id(main_stepper)->stop();
          } else {
            id(main_stepper)->set_max_speed(fabs(x));
            id(main_stepper)->set_target(x > 0 ? 1000000000 : -1000000000);
          }

# Position monitoring
sensor:
  - platform: template
    name: Current Position
    id: current_pos_sensor
    unit_of_measurement: steps
    lambda: return id(main_stepper)->current_position;
    update_interval: 1s
    icon: mdi:axis-arrow

# =====================================================================
# OPTIONAL: TMC2209 single-wire UART stack — DISABLED.
# Enable this block (and remove the a4988 `stepper:` above) once the UART
# link is wired/working to get StallGuard, current sensing and register
# configuration. It is sourced from this repo's vendored, ESPHome-compatible
# tmc2209 components (upstream slimcdk is currently incompatible with this
# ESPHome version — its codegen is missing the cg.templatable() wrappers).
# =====================================================================
#
# # UART configuration for TMC2209 (single-wire on GPIO7, open-drain + pull-up)
# uart:
#   id: tmc_uart
#   tx_pin:
#     number: GPIO7
#     mode:
#       input: true
#       output: true
#       open_drain: true
#       pullup: true
#     ignore_pin_validation_error: true
#   rx_pin:
#     number: GPIO7
#     mode:
#       input: true
#       pullup: true
#     ignore_pin_validation_error: true
#   baud_rate: 500000
#
# tmc2209_hub:
#   id: tmc_hub
#   uart_id: tmc_uart
#
# stepper:
#   - platform: tmc2209
#     id: main_stepper
#     tmc2209_hub_id: tmc_hub
#     address: 0x00
#     max_speed: 900 steps/s
#     acceleration: 1500 steps/s^2
#     deceleration: 500 steps/s^2
#     step_pin: GPIO35
#     dir_pin: GPIO34
#     enn_pin: GPIO9
#     diag_pin: GPIO4
#     rsense: 110 mOhm
#     vsense: false
#     clock_frequency: 12000000
# =====================================================================

# Text sensors for diagnostics
text_sensor:
  - platform: version
    name: ESPHome Version

# Output pins
output:
  - platform: gpio
    pin: GPIO18
    id: status_led
    inverted: false

husb238_i2c:
  id: usb_pd
  request_voltage: 20      # request 20V from the PD source (must be offered by the adapter)
  output_voltage:
    name: "USB Voltage"
  output_current:
    name: "USB Current"


