substitutions:
  device_name: microdriver
  friendly_name: MicroDriver Controller

external_components:
  # This repository is private. Keep the read-only GitHub token in Home
  # Assistant's secrets.yaml as `microdriver_github_token`.
  - source:
      type: git
      url: https://github.com/Trondle-Embedded-Systems/MicroDriver-software.git
      ref: main
      username: x-access-token
      password: !secret microdriver_github_token
    components: [tmc2209_hub, tmc2209, stepper, husb238_i2c]
    refresh: 1h

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # On this board the motor current MUST be programmed over UART: VREF (TMC2209
  # pin 17) is left unconnected on the PCB, so analog current scaling is unusable.
  # The tmc2209 component forces GCONF.i_scale_analog=0 (internal reference) and
  # the run/hold current is set digitally below via IRUN/IHOLD + RSENSE (110 mOhm).
  # Microstepping also comes from the MRES register (MS1/MS2 are tied to GND).
  on_boot:
    # priority -100 runs after the tmc2209 component setup (HARDWARE priority),
    # so the UART link is up and the driver has been probed before we configure it.
    priority: -100
    then:
      - tmc2209.configure:
          id: main_stepper
          microsteps: 8
          interpolation: true
      - tmc2209.currents:
          id: main_stepper
          run_current: 0.5 A      # conservative default — TUNE to your motor!
          hold_current: 0.2 A     # (ignored while standstill_mode is freewheeling)
          # Freewheeling = coils float at standstill: no idle holding current, no
          # idle chopper noise, and no motor load on VCC during the PD voltage jump.
          # Switch back to `normal` once power is stable if you need holding torque.
          standstill_mode: freewheeling

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}_AP
    password: !secret ap_password

# Logging — over the native USB (USB Serial/JTAG) so logs appear on the
# /dev/cu.usbmodem* port. This also frees both hardware UARTs; the TMC2209
# single-wire link uses UART0 routed to GPIO7 via the GPIO matrix.
logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 115200

# Over-the-air updates
ota:
  - platform: esphome
    password: !secret ota_password

# API configuration
api:
  encryption:
    key: !secret api_key

# Web server (optional)
web_server:
  port: 80

# I2C configuration
i2c:
  id: i2c_bus
  sda: GPIO17
  scl: GPIO21
  scan: true

# =====================================================================
# TMC2209 single-wire UART over a SINGLE GPIO (GPIO7 -> PDN_UART).
#
# Verified against the board netlist (Netlist_Schematic1_2026-06-06.tel): net
# "UTX" ties ESP32-S3 GPIO7 directly to TMC2209 PDN_UART (pin 14) with NO series
# resistor — a true single-wire half-duplex link. GPIO7 is configured open-drain
# + pull-up and the ESP UART peripheral routes BOTH TX and RX onto that one pad
# (esp-idf's uart_set_pin accepts tx_pin == rx_pin for single-wire operation).
# Open-drain is mandatory here: it prevents bus contention while the driver
# drives its reply. The ESP receives its own transmission echoed back on the
# shared wire; the tmc2209 component discards that echo (see tmc2209_api.cpp,
# read_register_once_ / send_datagram_).
#
# Motion uses dedicated STEP/DIR/ENN pins; the single UART wire carries all
# register configuration, current control and StallGuard/error diagnostics.
# =====================================================================

# Single-wire UART on GPIO7 (shared TX/RX, open-drain, internal pull-up).
# 115200 baud is reliable with the internal pull-up driving the line high during
# the ESP's stop/idle bits (no external pull-up on the PCB). The TMC2209
# auto-detects the baud from the sync nibble, so this can be raised later.
uart:
  id: tmc_uart
  tx_pin:
    number: GPIO7
    # Same physical pin as rx_pin (single wire). `allow_other_uses` silences the
    # "Pin 7 is used in multiple places" reuse check; `ignore_pin_validation_error`
    # silences the mode/capability check for the shared open-drain configuration.
    mode:
      input: true
      output: true
      open_drain: true
      pullup: true
    allow_other_uses: true
    ignore_pin_validation_error: true
  rx_pin:
    number: GPIO7
    mode:
      input: true
      pullup: true
    allow_other_uses: true
    ignore_pin_validation_error: true
  baud_rate: 115200

tmc2209_hub:
  id: tmc_hub
  uart_id: tmc_uart

# Stepper motor configuration (TMC2209 over single-wire UART + STEP/DIR motion).
stepper:
  - platform: tmc2209
    id: main_stepper
    tmc2209_hub_id: tmc_hub
    address: 0x00            # MS1_AD0/MS2_AD1 tied to GND on this board -> node 0
    step_pin: GPIO35
    dir_pin: GPIO34
    enn_pin: GPIO9           # active-low hardware enable
    diag_pin: GPIO4          # StallGuard / driver-error output
    rsense: 110 mOhm         # R18/R19 external sense resistors
    vsense: false
    clock_frequency: 12000000  # CLK pin tied to GND -> internal 12 MHz oscillator
    max_speed: 900 steps/s
    acceleration: 1500 steps/s^2
    deceleration: 500 steps/s^2

# Control buttons
button:
  - platform: template
    name: Stop Motor
    on_press:
      - stepper.stop: main_stepper
  - platform: template
    name: Move 1000 Steps Forward
    on_press:
      - stepper.set_target:
          id: main_stepper
          target: !lambda return id(main_stepper)->current_position + 1000;
  - platform: template
    name: Move 1000 Steps Backward
    on_press:
      - stepper.set_target:
          id: main_stepper
          target: !lambda return id(main_stepper)->current_position - 1000;
  - platform: template
    name: Home +
    on_press:
      - lambda: |-
          const int32_t travel = static_cast<int32_t>(lroundf(id(travel_length).state));
          id(main_stepper)->start_endstop_seek(
              esphome::stepper::Direction::FORWARD, travel, id(max_speed).state,
              id(homing_slow_speed).state, travel);
  - platform: template
    name: Home -
    on_press:
      - lambda: |-
          const int32_t travel = static_cast<int32_t>(lroundf(id(travel_length).state));
          id(main_stepper)->start_endstop_seek(
              esphome::stepper::Direction::BACKWARD, travel, id(max_speed).state,
              id(homing_slow_speed).state, 0);
  - platform: template
    name: Reset Position
    on_press:
      - stepper.report_position:
          id: main_stepper
          position: 0

# Target position + speed control
number:
  # Home +/- always moves this full distance relative to wherever the internal
  # counter currently is. That makes homing independent of manual door movement.
  - platform: template
    name: Travel Length
    id: travel_length
    min_value: 100
    max_value: 100000
    step: 100
    initial_value: 3200
    unit_of_measurement: steps
    optimistic: true
    mode: box
  - platform: template
    name: Homing Slow Speed
    id: homing_slow_speed
    min_value: 50
    max_value: 1000
    step: 50
    initial_value: 200
    unit_of_measurement: steps/s
    optimistic: true
    mode: box
  - platform: template
    name: Target Position
    id: target_position
    min_value: -100000
    max_value: 100000
    step: 100
    initial_value: 0
    unit_of_measurement: steps
    # Optimistic: remembers the last-commanded target. Previously this polled
    # current_position every 1s, which both spammed the log and overwrote the
    # user's set target with the live position. Use the Current Position sensor
    # for monitoring; this entity is purely a target command.
    optimistic: true
    set_action:
      - stepper.set_target:
          id: main_stepper
          target: !lambda return x;
  # Runtime-adjustable max speed (steps/s). The stepper has no speed getter, so
  # this is an optimistic control that remembers its value and applies it via
  # stepper.set_speed. `initial_value` matches the `max_speed:` set above.
  - platform: template
    name: Max Speed
    id: max_speed
    min_value: 50
    max_value: 2000
    step: 50
    initial_value: 900
    unit_of_measurement: steps/s
    icon: mdi:speedometer
    optimistic: true
    mode: box
    set_action:
      - stepper.set_speed:
          id: main_stepper
          speed: !lambda return x;
  # Live jog / velocity control. Drag to run the motor CONTINUOUSLY at the set
  # speed and direction: positive = forward, negative = backward, 0 = stop.
  # Changing the value while running updates the speed on the fly (the motion
  # loop re-ramps toward the new max speed). Implemented by aiming at a far-away
  # target and adjusting max_speed, since the stepper is position-based.
  - platform: template
    name: Jog Speed
    id: jog_speed
    min_value: -2000
    max_value: 2000
    step: 50
    initial_value: 0
    unit_of_measurement: steps/s
    icon: mdi:gauge
    optimistic: true
    mode: slider
    set_action:
      - lambda: |-
          if (x == 0) {
            id(main_stepper)->stop();
          } else {
            id(main_stepper)->set_max_speed(fabs(x));
            id(main_stepper)->set_target(x > 0 ? 1000000000 : -1000000000);
          }

# Position monitoring
sensor:
  - platform: template
    name: Current Position
    id: current_pos_sensor
    unit_of_measurement: steps
    lambda: return id(main_stepper)->current_position;
    update_interval: 1s
    icon: mdi:axis-arrow
    # Only publish when the position actually changes, so a stationary motor
    # stops re-publishing (and re-logging) the same value every second.
    filters:
      - delta: 0.5

# Text sensors for diagnostics
text_sensor:
  - platform: version
    name: ESPHome Version

# Output pins
output:
  - platform: gpio
    pin: GPIO18
    id: status_led
    inverted: false

husb238_i2c:
  id: usb_pd
  # 12 V has far more current headroom than 20 V (20 V PDOs are often only 1 A,
  # whose OCP trips on inrush -> brownout/bootloop). The driver auto-falls back to
  # the highest voltage the source actually advertises if 12 V isn't offered.
  # Raise to 15/20 only if your supply sustains the inrush (or after adding an
  # inrush-limiting / soft-start stage on VBUS->VCC in hardware).
  request_voltage: 12
  output_voltage:
    name: "USB Voltage"
  output_current:
    name: "USB Current"
