# Example configuration for the HUSB238 USB Power Delivery sink controller.

esphome:
  name: "usb-pd-controller"
  friendly_name: "USB PD Controller"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO9
    frequency: 100kHz

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ..
    components: [husb238_i2c]

husb238_i2c:
  id: usb_pd_main
  i2c_id: bus_a
  address: 0x08
  update_interval: 1s

  # Request a voltage from the source. Allowed: 5, 9, 12, 15, 18, 20.
  # The adapter must actually advertise this PDO, otherwise it is ignored.
  # Omit this line to leave the chip in auto mode (no request).
  request_voltage: 20

  output_voltage:
    name: "USB PD Negotiated Voltage"
  output_current:
    name: "USB PD Max Current"
